# CSFLE consumer WITHOUT KEK access — same .properties as the auth version;
# the difference is at the SUBPROCESS ENV layer: web/server.py spawns this
# consumer with AWS_ACCESS_KEY_ID="" / AWS_SECRET_ACCESS_KEY="" / AWS_SESSION_TOKEN=""
# so KMS denies the DEK unwrap. Schema rule onFailure=NONE on READ → tagged
# fields (ssn) come through as base64 ciphertext instead of throwing.
bootstrap.servers=${BOOTSTRAP_SERVERS}
security.protocol=SASL_SSL
sasl.mechanism=PLAIN
sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_API_KEY}" password="${KAFKA_API_SECRET}";

group.id=demo-csfle-no-kek
auto.offset.reset=earliest

schema.registry.url=${SR_URL}
basic.auth.credentials.source=USER_INFO
basic.auth.user.info=${SR_API_KEY}:${SR_API_SECRET}
use.latest.version=true

rule.executors=_default_
rule.executors._default_.class=io.confluent.kafka.schemaregistry.encryption.FieldEncryptionExecutor
