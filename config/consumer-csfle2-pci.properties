# CSFLE2 consumer with PCI KEK access only (NO PII KEK).
# Decrypts credit_card_number + card_cvv (tagged PCI); ssn (tagged PII) comes
# back as base64 ciphertext.
bootstrap.servers=${BOOTSTRAP_SERVERS}
security.protocol=SASL_SSL
sasl.mechanism=PLAIN
sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${CSFLE2_CONSUMER_PCI_KAFKA_API_KEY}" password="${CSFLE2_CONSUMER_PCI_KAFKA_API_SECRET}";

group.id=demo-csfle2-pci
auto.offset.reset=earliest

schema.registry.url=${SR_URL}
basic.auth.credentials.source=USER_INFO
basic.auth.user.info=${CSFLE2_CONSUMER_PCI_SR_API_KEY}:${CSFLE2_CONSUMER_PCI_SR_API_SECRET}
use.latest.version=true

rule.executors=_default_
rule.executors._default_.class=io.confluent.kafka.schemaregistry.encryption.FieldEncryptionExecutor
