# Producer for the CSFLE2 topic — uses the per-SA csfle2-producer keys
# (DevWrite on Topic + Subject + both PII and PCI KEKs). envsubst-templated.
bootstrap.servers=${BOOTSTRAP_SERVERS}
security.protocol=SASL_SSL
sasl.mechanism=PLAIN
sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${CSFLE2_PRODUCER_KAFKA_API_KEY}" password="${CSFLE2_PRODUCER_KAFKA_API_SECRET}";

schema.registry.url=${SR_URL}
basic.auth.credentials.source=USER_INFO
basic.auth.user.info=${CSFLE2_PRODUCER_SR_API_KEY}:${CSFLE2_PRODUCER_SR_API_SECRET}
use.latest.version=true
auto.register.schemas=false

# Single FieldEncryptionExecutor entry handles BOTH ENCRYPT rules (PII tag and
# PCI tag) — the framework dispatches by tag → rule → KEK internally.
rule.executors=_default_
rule.executors._default_.class=io.confluent.kafka.schemaregistry.encryption.FieldEncryptionExecutor
