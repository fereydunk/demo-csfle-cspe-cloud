# CSFLE2 consumer with PII KEK access only (NO PCI KEK).
# Decrypts ssn (tagged PII); credit_card_number / card_cvv (tagged PCI) come
# back as base64 ciphertext because SR DEK Registry returns 403 for the PCI
# KEK and onFailure=NONE leaves the ciphertext in place.
bootstrap.servers=${BOOTSTRAP_SERVERS}
security.protocol=SASL_SSL
sasl.mechanism=PLAIN
sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${CSFLE2_CONSUMER_PII_KAFKA_API_KEY}" password="${CSFLE2_CONSUMER_PII_KAFKA_API_SECRET}";

group.id=demo-csfle2-pii
auto.offset.reset=earliest

schema.registry.url=${SR_URL}
basic.auth.credentials.source=USER_INFO
basic.auth.user.info=${CSFLE2_CONSUMER_PII_SR_API_KEY}:${CSFLE2_CONSUMER_PII_SR_API_SECRET}
use.latest.version=true

rule.executors=_default_
rule.executors._default_.class=io.confluent.kafka.schemaregistry.encryption.FieldEncryptionExecutor
