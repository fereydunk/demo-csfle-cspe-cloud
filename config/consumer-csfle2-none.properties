# CSFLE2 consumer with NO KEK access (no PII, no PCI).
# All tagged fields come back as base64 ciphertext (SR DEK Registry returns
# 403 for both KEKs; onFailure=NONE keeps the ciphertext).
bootstrap.servers=${BOOTSTRAP_SERVERS}
security.protocol=SASL_SSL
sasl.mechanism=PLAIN
sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${CSFLE2_CONSUMER_NONE_KAFKA_API_KEY}" password="${CSFLE2_CONSUMER_NONE_KAFKA_API_SECRET}";

group.id=demo-csfle2-none
auto.offset.reset=earliest

schema.registry.url=${SR_URL}
basic.auth.credentials.source=USER_INFO
basic.auth.user.info=${CSFLE2_CONSUMER_NONE_SR_API_KEY}:${CSFLE2_CONSUMER_NONE_SR_API_SECRET}
use.latest.version=true

rule.executors=_default_
rule.executors._default_.class=io.confluent.kafka.schemaregistry.encryption.FieldEncryptionExecutor
